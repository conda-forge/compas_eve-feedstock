{% set name = "compas_eve" %}
{% set version = "2.2.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/compas_eve-{{ version }}.tar.gz
  sha256: dd5a65539f01a35b5553dc8493535c967fce447bac3c94f0e3640782a8396af0

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - compas
    - paho-mqtt >=1,<3
    - python >={{ python_min }}
    - compas_pb >=0.4.4,<1

test:
  imports:
    - compas_eve
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/gramaziokohler/compas_eve
  summary: 'COMPAS Event Extensions: event-based communication infrastructure for the COMPAS framework'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gonzalocasas
