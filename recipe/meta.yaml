{% set name = "compas_eve" %}
{% set version = "2.0.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/compas_eve-{{ version }}.tar.gz
  sha256: 388ee06e913c50fcba9756271726ccb7e95020099607a854ceeb31cadfbca030

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - compas
    - paho-mqtt >=1,<2
    - python >={{ python_min }}

test:
  imports:
    - compas_eve
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/gramaziokohler/compas_eve
  summary: 'COMPAS Event Extensions: event-based communication infrastructure for the COMPAS framework'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gonzalocasas
